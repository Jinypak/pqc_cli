; pqc_cli 설정 예시 (선택사항)
; 이 파일이 없어도 동작한다. slot 과 PIN 은 실행 중 대화형으로 선택·입력한다.
; 이 파일을 config.ini 로 복사해 lib_path 등 기본값만 바꿔 쓸 수 있다.

[hsm]
; Luna Client PKCS#11 라이브러리(cryptoki) 경로
lib_path = C:\Program Files\SafeNet\LunaClient\cryptoki.dll
; 기본 슬롯 번호(대화형에서 다시 선택 가능)
slot     = 0
; PIN 은 보안을 위해 여기 두지 말고 실행 중 입력하는 것을 권장
; pin    =

[options]
; 키 생성 시 토큰에 영구 저장(CKA_TOKEN) 여부 — 대화형에서 매번 확인
token_objects = true
; 로그 레벨: DEBUG / INFO / WARNING / ERROR
log_level     = INFO
